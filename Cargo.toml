[package]
name = "kwin-mcp"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1"
serde = { version = "1", features = ["derive"] }
tokio = { version = "1", features = ["full"] }
reis = "0.5"
nix = { version = "0.29", features = ["signal", "process", "fs", "socket"] }
chrono = "0.4"
dbus = "0.9"
serde_json = "1"
mcpkit = "0.5"
png = "0.17"
atspi = { version = "0.29", features = ["tokio"] }
tempfile = "3"
keyboard-codes = "0.3"
ashpd = { version = "0.13", default-features = false, features = ["tokio", "remote_desktop", "screencast"] }
futures = "0.3"
zbus = "5"

[lints.clippy]
wildcard_enum_match_arm = "deny"
unwrap_used = "deny"
expect_used = "deny"
todo = "deny"
unimplemented = "deny"
unreachable = "deny"
as_conversions = "deny"
wildcard_imports = "deny"

[lints.rust]
dead_code = "deny"
